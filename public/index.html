<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AG-Code Token — Universal AI Token Monitor</title>
  <meta name="description" content="See where your AI coding tokens go. Monitor usage across Antigravity, Claude Code, Codex, Cursor, Windsurf, Cline, and more.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #16161f;
      --bg-card-hover: #1c1c28;
      --bg-glass: rgba(22, 22, 31, 0.7);
      --border: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(255, 255, 255, 0.12);
      --text-primary: #e8e8f0;
      --text-secondary: #8888a0;
      --text-muted: #555570;
      --accent-blue: #4f8cff;
      --accent-purple: #a855f7;
      --accent-cyan: #22d3ee;
      --accent-green: #34d399;
      --accent-orange: #fb923c;
      --accent-pink: #f472b6;
      --accent-red: #ef4444;
      --accent-yellow: #fbbf24;
      --gradient-fire: linear-gradient(135deg, #ff6b35 0%, #f7931e 30%, #ffcc02 70%, #ff6b35 100%);
      --gradient-hero: linear-gradient(135deg, #4f8cff 0%, #a855f7 50%, #f472b6 100%);
      --gradient-card: linear-gradient(135deg, rgba(79, 140, 255, 0.05) 0%, rgba(168, 85, 247, 0.05) 100%);
      --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.5);
      --shadow-glow: 0 0 40px rgba(79, 140, 255, 0.15);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── Ambient Background ─── */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(79, 140, 255, 0.06) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(168, 85, 247, 0.04) 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 50%, rgba(244, 114, 182, 0.03) 0%, transparent 40%);
      z-index: -1;
      animation: ambientDrift 20s ease-in-out infinite alternate;
    }

    @keyframes ambientDrift {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(-30px, 20px) rotate(2deg); }
    }

    /* ─── Header ─── */
    .header {
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 10, 15, 0.85);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      background: var(--gradient-fire);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--gradient-fire);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 20px rgba(255, 107, 53, 0.3);
    }

    .header-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .period-btn {
      padding: 8px 18px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .period-btn:hover {
      border-color: var(--border-hover);
      color: var(--text-primary);
      background: var(--bg-card);
    }

    .period-btn.active {
      background: var(--accent-blue);
      border-color: var(--accent-blue);
      color: white;
      box-shadow: 0 0 20px rgba(79, 140, 255, 0.3);
    }

    .provider-select {
      padding: 8px 14px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-primary);
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      outline: none;
      margin-left: 12px;
    }

    .provider-select option {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    /* ─── Main Layout ─── */
    .main {
      padding: 32px 40px;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* ─── Hero Stats Row ─── */
    .hero-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }

    .hero-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .hero-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-glow);
    }

    .hero-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
    }

    .hero-card:nth-child(1)::after { background: linear-gradient(90deg, var(--accent-orange), var(--accent-yellow)); }
    .hero-card:nth-child(2)::after { background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan)); }
    .hero-card:nth-child(3)::after { background: linear-gradient(90deg, var(--accent-purple), var(--accent-pink)); }
    .hero-card:nth-child(4)::after { background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan)); }

    .hero-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .hero-value {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .hero-value.cost { color: var(--accent-orange); }
    .hero-value.tokens { color: var(--accent-blue); }
    .hero-value.calls { color: var(--accent-purple); }
    .hero-value.projects { color: var(--accent-green); }

    .hero-sub {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ─── Grid Layouts ─── */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }

    /* ─── Cards ─── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      transition: all 0.3s ease;
    }

    .card:hover {
      border-color: var(--border-hover);
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title .icon {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }

    /* ─── Bar Charts ─── */
    .bar-row {
      display: flex;
      align-items: center;
      margin-bottom: 14px;
      gap: 12px;
    }

    .bar-label {
      width: 130px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bar-track {
      flex: 1;
      height: 28px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      border-radius: 6px;
      min-width: 4px;
      transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      display: flex;
      align-items: center;
      padding-left: 10px;
    }

    .bar-fill-text {
      font-size: 11px;
      font-weight: 600;
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
      white-space: nowrap;
    }

    .bar-value {
      width: 85px;
      text-align: right;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }

    /* ─── Provider Badges ─── */
    .provider-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    .provider-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      transition: all 0.2s ease;
    }

    .provider-badge.active {
      border-color: var(--accent-blue);
      background: rgba(79, 140, 255, 0.08);
    }

    .provider-badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    .provider-badge .dot.active { background: var(--accent-green); }
    .provider-badge .dot.inactive { background: var(--text-muted); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .provider-name {
      font-size: 13px;
      font-weight: 500;
    }

    .provider-count {
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ─── Token Donut / Pie visual ─── */
    .token-breakdown {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .token-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 8px;
      transition: background 0.2s;
    }

    .token-row:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .token-row-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .token-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
    }

    .token-name {
      font-size: 13px;
      font-weight: 500;
    }

    .token-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    /* ─── Loading State ─── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      gap: 20px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* ─── Empty State ─── */
    .empty-state {
      text-align: center;
      padding: 60px;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-secondary);
    }

    .empty-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ─── Project Table ─── */
    .project-table {
      width: 100%;
      border-collapse: collapse;
    }

    .project-table th {
      text-align: left;
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    .project-table td {
      padding: 14px 16px;
      font-size: 13px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .project-table tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    .project-table .mono {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
    }

    .tag {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tag-antigravity { background: rgba(79, 140, 255, 0.15); color: var(--accent-blue); }
    .tag-claude { background: rgba(168, 85, 247, 0.15); color: var(--accent-purple); }
    .tag-codex { background: rgba(52, 211, 153, 0.15); color: var(--accent-green); }
    .tag-cursor { background: rgba(34, 211, 238, 0.15); color: var(--accent-cyan); }
    .tag-windsurf { background: rgba(251, 146, 60, 0.15); color: var(--accent-orange); }
    .tag-cline { background: rgba(244, 114, 182, 0.15); color: var(--accent-pink); }
    .tag-copilot { background: rgba(255, 255, 255, 0.1); color: var(--text-secondary); }
    .tag-continue { background: rgba(251, 191, 36, 0.15); color: var(--accent-yellow); }
    .tag-aider { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); }

    /* ─── Responsive ─── */
    @media (max-width: 1200px) {
      .hero-stats { grid-template-columns: repeat(2, 1fr); }
      .grid-3 { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 768px) {
      .header { padding: 16px 20px; flex-direction: column; gap: 16px; }
      .main { padding: 20px; }
      .hero-stats { grid-template-columns: 1fr; }
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .hero-value { font-size: 28px; }
    }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo-icon">🔥</div>
      <span class="logo">AG-Code Token</span>
    </div>
    <div class="header-controls">
      <button class="period-btn active" data-period="today">Today</button>
      <button class="period-btn" data-period="week">7 Days</button>
      <button class="period-btn" data-period="30days">30 Days</button>
      <button class="period-btn" data-period="month">Month</button>
      <button class="period-btn" data-period="all">All Time</button>
      <select class="provider-select" id="providerFilter">
        <option value="all">All Providers</option>
      </select>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main" id="app">
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <div class="loading-text">Discovering AI coding tools...</div>
    </div>
  </main>

  <script>
    // ─── State ───────────────────────────────────────────────────────────────
    let currentPeriod = 'today';
    let currentProvider = 'all';
    let summaryData = null;
    let providersData = null;

    const PROVIDER_COLORS = {
      antigravity: '#4f8cff',
      claude: '#a855f7',
      codex: '#34d399',
      cursor: '#22d3ee',
      windsurf: '#fb923c',
      cline: '#f472b6',
      copilot: '#8888a0',
      continue: '#fbbf24',
      aider: '#ef4444',
    };

    const BAR_GRADIENTS = [
      'linear-gradient(90deg, #4f8cff, #6ba3ff)',
      'linear-gradient(90deg, #a855f7, #c084fc)',
      'linear-gradient(90deg, #22d3ee, #67e8f9)',
      'linear-gradient(90deg, #34d399, #6ee7b7)',
      'linear-gradient(90deg, #fb923c, #fdba74)',
      'linear-gradient(90deg, #f472b6, #f9a8d4)',
      'linear-gradient(90deg, #fbbf24, #fcd34d)',
      'linear-gradient(90deg, #ef4444, #f87171)',
    ];

    // ─── Formatting ──────────────────────────────────────────────────────────
    function formatCost(usd) {
      if (usd === 0) return '$0.00';
      if (usd < 0.01) return '$' + usd.toFixed(4);
      if (usd < 1) return '$' + usd.toFixed(3);
      return '$' + usd.toFixed(2);
    }

    function formatTokens(n) {
      if (n === 0) return '0';
      if (n < 1000) return n.toString();
      if (n < 1_000_000) return (n / 1000).toFixed(1) + 'K';
      if (n < 1_000_000_000) return (n / 1_000_000).toFixed(2) + 'M';
      return (n / 1_000_000_000).toFixed(2) + 'B';
    }

    function formatNumber(n) {
      return n.toLocaleString();
    }

    // ─── API ─────────────────────────────────────────────────────────────────
    async function fetchJSON(url) {
      const res = await fetch(url);
      return res.json();
    }

    async function loadProviders() {
      providersData = await fetchJSON('/api/providers');
      const select = document.getElementById('providerFilter');

      // Rebuild options
      select.innerHTML = '<option value="all">All Providers</option>';
      for (const p of providersData.all) {
        const active = providersData.active.find(a => a.name === p.name);
        const label = active ? `${p.displayName} (${active.sessionCount})` : `${p.displayName}`;
        const opt = document.createElement('option');
        opt.value = p.name;
        opt.textContent = label;
        if (!active) opt.disabled = true;
        select.appendChild(opt);
      }
    }

    async function loadSummary() {
      summaryData = await fetchJSON(`/api/summary?period=${currentPeriod}&provider=${currentProvider}`);
      render();
    }

    // ─── Render ──────────────────────────────────────────────────────────────
    function render() {
      const app = document.getElementById('app');
      if (!summaryData) return;

      const d = summaryData;

      if (d.totalApiCalls === 0 && d.projectCount === 0) {
        app.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <div class="empty-title">No usage data for this period</div>
            <div class="empty-desc">
              No AI coding sessions found for "${d.period}".
              Try selecting a longer time range or check if your AI tools have session data on disk.
            </div>
          </div>`;
        return;
      }

      const totalTokens = d.totalInputTokens + d.totalOutputTokens + d.totalCacheReadTokens + d.totalCacheWriteTokens + d.totalReasoningTokens;

      app.innerHTML = `
        <!-- Active Providers -->
        ${providersData?.active?.length > 0 ? `
        <div class="provider-badges">
          ${providersData.active.map(p => `
            <div class="provider-badge ${currentProvider === 'all' || currentProvider === p.name ? 'active' : ''}">
              <div class="dot active"></div>
              <span class="provider-name">${p.displayName}</span>
              <span class="provider-count">${p.sessionCount} sessions</span>
            </div>
          `).join('')}
        </div>` : ''}

        <!-- Hero Stats -->
        <div class="hero-stats">
          <div class="hero-card">
            <div class="hero-label">Total Cost</div>
            <div class="hero-value cost">${formatCost(d.totalCostUSD)}</div>
            <div class="hero-sub">${d.period}</div>
          </div>
          <div class="hero-card">
            <div class="hero-label">Total Tokens</div>
            <div class="hero-value tokens">${formatTokens(totalTokens)}</div>
            <div class="hero-sub">${formatTokens(d.totalInputTokens)} in · ${formatTokens(d.totalOutputTokens)} out</div>
          </div>
          <div class="hero-card">
            <div class="hero-label">API Calls</div>
            <div class="hero-value calls">${formatNumber(d.totalApiCalls)}</div>
            <div class="hero-sub">across ${d.projectCount} project${d.projectCount !== 1 ? 's' : ''}</div>
          </div>
          <div class="hero-card">
            <div class="hero-label">Active IDEs</div>
            <div class="hero-value projects">${d.providers?.length || 0}</div>
            <div class="hero-sub">${d.providers?.map(p => p.displayName).join(', ') || 'None'}</div>
          </div>
        </div>

        <!-- Models + Providers Row -->
        <div class="grid-2">
          <!-- Model Breakdown -->
          <div class="card">
            <div class="card-title"><span class="icon" style="background:rgba(168,85,247,0.2)">🧠</span> Model Breakdown</div>
            ${d.models?.length > 0 ? d.models.map((m, i) => {
              const pct = d.totalCostUSD > 0 ? (m.costUSD / d.totalCostUSD * 100) : 0;
              return `
              <div class="bar-row">
                <div class="bar-label">${m.name}</div>
                <div class="bar-track">
                  <div class="bar-fill" style="width:${Math.max(pct, 2)}%; background:${BAR_GRADIENTS[i % BAR_GRADIENTS.length]}">
                    ${pct > 15 ? `<span class="bar-fill-text">${pct.toFixed(0)}%</span>` : ''}
                  </div>
                </div>
                <div class="bar-value">${formatCost(m.costUSD)}</div>
              </div>`;
            }).join('') : '<div class="empty-state"><div class="empty-desc">No model data</div></div>'}
          </div>

          <!-- Provider Breakdown -->
          <div class="card">
            <div class="card-title"><span class="icon" style="background:rgba(79,140,255,0.2)">🔌</span> Provider Breakdown</div>
            ${d.providers?.length > 0 ? d.providers.map((p, i) => {
              const pct = d.totalCostUSD > 0 ? (p.costUSD / d.totalCostUSD * 100) : 0;
              const color = PROVIDER_COLORS[p.name] || '#8888a0';
              return `
              <div class="bar-row">
                <div class="bar-label">${p.displayName}</div>
                <div class="bar-track">
                  <div class="bar-fill" style="width:${Math.max(pct, 2)}%; background:linear-gradient(90deg, ${color}, ${color}88)">
                    ${pct > 15 ? `<span class="bar-fill-text">${pct.toFixed(0)}%</span>` : ''}
                  </div>
                </div>
                <div class="bar-value">${formatCost(p.costUSD)}</div>
              </div>`;
            }).join('') : '<div class="empty-state"><div class="empty-desc">No provider data</div></div>'}
          </div>
        </div>

        <!-- Token Breakdown + Tools Row -->
        <div class="grid-2">
          <!-- Token Breakdown -->
          <div class="card">
            <div class="card-title"><span class="icon" style="background:rgba(34,211,238,0.2)">📊</span> Token Breakdown</div>
            <div class="token-breakdown">
              <div class="token-row">
                <div class="token-row-left">
                  <div class="token-dot" style="background:var(--accent-blue)"></div>
                  <span class="token-name">Input Tokens</span>
                </div>
                <span class="token-value">${formatTokens(d.totalInputTokens)}</span>
              </div>
              <div class="token-row">
                <div class="token-row-left">
                  <div class="token-dot" style="background:var(--accent-purple)"></div>
                  <span class="token-name">Output Tokens</span>
                </div>
                <span class="token-value">${formatTokens(d.totalOutputTokens)}</span>
              </div>
              <div class="token-row">
                <div class="token-row-left">
                  <div class="token-dot" style="background:var(--accent-cyan)"></div>
                  <span class="token-name">Cache Read</span>
                </div>
                <span class="token-value">${formatTokens(d.totalCacheReadTokens)}</span>
              </div>
              <div class="token-row">
                <div class="token-row-left">
                  <div class="token-dot" style="background:var(--accent-orange)"></div>
                  <span class="token-name">Cache Write</span>
                </div>
                <span class="token-value">${formatTokens(d.totalCacheWriteTokens)}</span>
              </div>
              <div class="token-row">
                <div class="token-row-left">
                  <div class="token-dot" style="background:var(--accent-pink)"></div>
                  <span class="token-name">Reasoning</span>
                </div>
                <span class="token-value">${formatTokens(d.totalReasoningTokens)}</span>
              </div>
            </div>
          </div>

          <!-- Tool Usage -->
          <div class="card">
            <div class="card-title"><span class="icon" style="background:rgba(52,211,153,0.2)">🔧</span> Tool Usage</div>
            ${d.tools?.length > 0 ? d.tools.slice(0, 10).map((t, i) => {
              const maxCalls = d.tools[0].calls;
              const pct = maxCalls > 0 ? (t.calls / maxCalls * 100) : 0;
              return `
              <div class="bar-row">
                <div class="bar-label">${t.name}</div>
                <div class="bar-track">
                  <div class="bar-fill" style="width:${Math.max(pct, 2)}%; background:${BAR_GRADIENTS[i % BAR_GRADIENTS.length]}">
                    ${pct > 20 ? `<span class="bar-fill-text">${t.calls}</span>` : ''}
                  </div>
                </div>
                <div class="bar-value">${formatNumber(t.calls)}</div>
              </div>`;
            }).join('') : '<div class="empty-state"><div class="empty-desc">No tool data</div></div>'}
          </div>
        </div>

        <!-- Projects Table -->
        <div class="card">
          <div class="card-title"><span class="icon" style="background:rgba(251,191,36,0.2)">📁</span> Projects</div>
          ${d.projects?.length > 0 ? `
          <table class="project-table">
            <thead>
              <tr>
                <th>Project</th>
                <th>IDE</th>
                <th>Cost</th>
                <th>API Calls</th>
                <th>Input Tokens</th>
                <th>Output Tokens</th>
              </tr>
            </thead>
            <tbody>
              ${d.projects.slice(0, 20).map(p => `
              <tr>
                <td style="font-weight:500">${p.project}</td>
                <td><span class="tag tag-${p.provider}">${p.providerDisplayName}</span></td>
                <td class="mono" style="color:var(--accent-orange)">${formatCost(p.costUSD)}</td>
                <td class="mono">${formatNumber(p.apiCalls)}</td>
                <td class="mono">${formatTokens(p.inputTokens)}</td>
                <td class="mono">${formatTokens(p.outputTokens)}</td>
              </tr>
              `).join('')}
            </tbody>
          </table>` : '<div class="empty-state"><div class="empty-desc">No projects</div></div>'}
        </div>
      `;
    }

    // ─── Event Listeners ─────────────────────────────────────────────────────
    document.querySelectorAll('.period-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentPeriod = btn.dataset.period;
        loadSummary();
      });
    });

    document.getElementById('providerFilter').addEventListener('change', (e) => {
      currentProvider = e.target.value;
      loadSummary();
    });

    // ─── Init ────────────────────────────────────────────────────────────────
    async function init() {
      try {
        await loadProviders();
        await loadSummary();
      } catch (err) {
        document.getElementById('app').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <div class="empty-title">Connection Error</div>
            <div class="empty-desc">Could not connect to the AG-Code Token server. Make sure it's running on port 3777.</div>
          </div>`;
      }
    }

    init();

    // Auto-refresh every 5 minutes
    setInterval(() => loadSummary(), 5 * 60 * 1000);
  </script>
</body>
</html>
