<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wasted Token Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 320px;
      height: 380px;
      background: transparent;
      overflow: hidden;
      font-family: 'Consolas', 'Cascadia Code', 'Segoe UI Mono', monospace;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Compact strip (always at bottom) ───────────────────── */
    #strip {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: rgba(14, 14, 20, 0.93);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 10px 10px 6px 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      cursor: pointer;
      -webkit-app-region: drag;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: border-color 0.15s;
    }
    #strip:hover {
      border-color: rgba(255, 255, 255, 0.2);
    }

    .strip-item {
      font-size: 12px;
      white-space: nowrap;
      -webkit-app-region: no-drag;
      line-height: 1;
    }
    .s-cost  { color: #f0c040; font-weight: 700; letter-spacing: 0.3px; }
    .s-sep   { color: rgba(255, 255, 255, 0.2); font-size: 10px; }
    .s-in    { color: #4fc3f7; }
    .s-out   { color: #81c784; }
    .s-win   { color: #ce93d8; font-size: 11px; }
    .s-calls { color: rgba(255,255,255,0.45); font-size: 10px; }

    .dot-indicator {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }
    .dot-active   { background: #4caf50; box-shadow: 0 0 6px #4caf5088; animation: pulse-dot 2s ease-in-out infinite; }
    .dot-loading  { background: #f0c040; animation: pulse-dot 0.8s ease-in-out infinite; }
    .dot-offline  { background: rgba(255,255,255,0.2); }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    /* ── Expanded detail panel ───────────────────────────────── */
    #panel {
      position: fixed;
      bottom: 44px;
      left: 0;
      right: 0;
      height: 202px;
      background: rgba(14, 14, 20, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 10px;
      padding: 12px 14px 10px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: none;
      flex-direction: column;
      gap: 0;
    }
    #panel.open { display: flex; }

    .panel-hd {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.35);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-hd-period {
      color: rgba(255, 255, 255, 0.5);
      background: rgba(255,255,255,0.07);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 9px;
      letter-spacing: 0.5px;
    }

    .panel-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }
    .panel-row:last-child { border-bottom: none; }

    .panel-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
    }
    .panel-val {
      font-size: 12px;
      color: #e0e0e0;
      font-weight: 500;
    }
    .val-cost    { color: #f0c040; }
    .val-in      { color: #4fc3f7; }
    .val-out     { color: #81c784; }
    .val-win     { color: #ce93d8; }
    .val-offline { color: rgba(255,255,255,0.25); }

    .panel-footer {
      margin-top: auto;
      padding-top: 8px;
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      text-align: right;
    }
  </style>
</head>
<body>

  <div id="panel">
    <div class="panel-hd">
      <span>⚡ Wasted Token Tracker</span>
      <span class="panel-hd-period" id="p-period">TODAY</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Total Cost</span>
      <span class="panel-val val-cost" id="p-cost">—</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Input Tokens</span>
      <span class="panel-val val-in"  id="p-in">—</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Output Tokens</span>
      <span class="panel-val val-out" id="p-out">—</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">API Calls</span>
      <span class="panel-val" id="p-calls">—</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Claude Window</span>
      <span class="panel-val val-win" id="p-win">—</span>
    </div>
    <div id="p-model-limits"></div>
    <div class="panel-footer" id="p-updated">—</div>
  </div>

  <div id="strip">
    <div class="dot-indicator dot-loading" id="dot"></div>
    <span class="strip-item s-cost"  id="s-cost">$—</span>
    <span class="strip-item s-sep">·</span>
    <span class="strip-item s-in"   id="s-in">—↑</span>
    <span class="strip-item s-out"  id="s-out">—↓</span>
    <span class="strip-item s-sep">·</span>
    <span class="strip-item s-win"  id="s-win">—</span>
  </div>

  <script>
    'use strict';
    function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    const BASE = 'http://127.0.0.1:3777';
    let expanded = false;

    function fmtTok(n) {
      if (!n) return '0';
      if (n < 1e3) return String(n);
      if (n < 1e6) return (n / 1e3).toFixed(1) + 'K';
      return (n / 1e6).toFixed(2) + 'M';
    }

    function fmtCost(v) {
      if (!v) return '$0.00';
      if (v < 0.01) return '$' + v.toFixed(4);
      if (v < 1)    return '$' + v.toFixed(3);
      return '$' + v.toFixed(2);
    }

    function fmtTime(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    async function refresh() {
      const dot = document.getElementById('dot');
      dot.className = 'dot-indicator dot-loading';

      try {
        const [summary, win] = await Promise.all([
          fetch(`${BASE}/api/summary?period=today`).then(r => r.json()),
          fetch(`${BASE}/api/billing-window`).then(r => r.json()).catch(() => null),
        ]);

        // ── strip ──
        document.getElementById('s-cost').textContent = fmtCost(summary.totalCostUSD);
        document.getElementById('s-in').textContent   = fmtTok(summary.totalInputTokens) + '↑';
        document.getElementById('s-out').textContent  = fmtTok(summary.totalOutputTokens) + '↓';
        document.getElementById('s-win').textContent  = win?.isActive
          ? '⏱ ' + (win.resetInFormatted || '—')
          : (win ? 'expired' : '—');
        dot.className = 'dot-indicator dot-active';

        // ── panel ──
        document.getElementById('p-cost').textContent  = fmtCost(summary.totalCostUSD);
        document.getElementById('p-in').textContent    = fmtTok(summary.totalInputTokens);
        document.getElementById('p-out').textContent   = fmtTok(summary.totalOutputTokens);
        document.getElementById('p-calls').textContent = (summary.totalApiCalls || 0).toLocaleString();

        if (win) {
          const winTxt = win.isActive
            ? `resets in ${win.resetInFormatted} · ${fmtTok(win.tokensUsed)} tok`
            : 'expired';
          document.getElementById('p-win').textContent = winTxt;
        } else {
          document.getElementById('p-win').textContent = 'no claude data';
        }

        const provs = summary.providers?.map(p => p.displayName).join(', ') || '—';
        // Model context window rows
        const limEl = document.getElementById('p-model-limits');
        if (summary.models?.length) {
          limEl.innerHTML = summary.models.slice(0, 4).map(m => {
            const ctx = m.contextWindow;
            const used = (m.inputTokens || 0) + (m.outputTokens || 0);
            const pct = ctx ? Math.min(Math.round(used / ctx * 100), 100) : null;
            const ctxLabel = ctx
              ? (ctx >= 1_000_000 ? (ctx/1_000_000).toFixed(ctx%1_000_000===0?0:1)+'M' : Math.round(ctx/1000)+'K') + ' ctx'
              : '? ctx';
            const pctLabel = pct !== null ? ` · ${pct}% used` : '';
            return `<div class="panel-row"><span class="panel-label">${esc(m.name)}</span><span class="panel-val" style="color:#b0bec5;font-size:11px">${ctxLabel}${pctLabel}</span></div>`;
          }).join('');
        }

        const now = new Date();
        document.getElementById('p-updated').textContent =
          'updated ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      } catch {
        dot.className = 'dot-indicator dot-offline';
        document.getElementById('s-cost').textContent = 'offline';
        document.getElementById('s-win').textContent  = 'server down';
      }
    }

    // ── strip click = toggle panel ──
    document.getElementById('strip').addEventListener('click', () => {
      expanded = !expanded;
      document.getElementById('panel').classList.toggle('open', expanded);
    });

    // Start polling
    refresh();
    setInterval(refresh, 30_000);
  </script>
</body>
</html>
